# Complete strict driver configuration for an NFS-only instance.
# Export TRUENAS_API_KEY before starting scale-csi.
driver: csi.scale.io
driverInstanceId: csi.scale.io@tank/k8s/nfs

fencing:
  mode: "off"
  startupReconcileTimeout: 10m
  staleRecordGracePeriod: 10m

truenas:
  protocol: https
  host: truenas.example.com
  port: 443
  apiKey: $TRUENAS_API_KEY
  allowInsecure: false
  requestTimeout: 60
  connectTimeout: 10
  writeTimeout: 30
  maxConcurrentRequests: 10

zfs:
  datasetParentName: tank/k8s/nfs
  datasetEnableQuotas: true
  datasetEnableReservation: false
  datasetProperties:
    compression: zstd
  destroyForeignSnapshotsOnDelete: false

nfs:
  enabled: true
  shareHost: truenas.example.com
  # Restrict this to the Kubernetes node CIDRs in production.
  shareAllowedNetworks:
    - 10.42.0.0/16
  shareAllowedHosts: []
  shareMaprootUser: root
  shareMaprootGroup: wheel
  shareMapallUser: ""
  shareMapallGroup: ""
