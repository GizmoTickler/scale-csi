# Complete strict driver configuration for an iSCSI-only instance.
# Export TRUENAS_API_KEY before starting scale-csi.
driver: csi.scale.io
driverInstanceId: csi.scale.io@tank/k8s/iscsi

fencing:
  mode: "off"
  startupReconcileTimeout: 10m
  staleRecordGracePeriod: 10m

truenas:
  protocol: https
  host: truenas.example.com
  port: 443
  apiKey: $TRUENAS_API_KEY
  allowInsecure: false
  requestTimeout: 60
  connectTimeout: 10
  writeTimeout: 30
  maxConcurrentRequests: 10

zfs:
  datasetParentName: tank/k8s/iscsi
  zvolBlocksize: 16K
  zvolEnableReservation: false
  datasetProperties:
    compression: zstd
  destroyForeignSnapshotsOnDelete: false

iscsi:
  enabled: true
  targetPortal: truenas.example.com:3260
  interface: default
  # Leave targetGroups absent to let the driver resolve the portal and an
  # allow-all initiator group. CHAP and dm-multipath are not supported; protect
  # TCP 3260 with a dedicated storage network and node-only filtering.
  extentBlocksize: 512
  extentDisablePhysicalBlocksize: false
  extentRpm: SSD
  extentAvailThreshold: 0
  deviceWaitTimeout: 60
  serviceReloadDebounce: 2000
