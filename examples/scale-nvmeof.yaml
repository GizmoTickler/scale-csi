# Complete strict driver configuration for an NVMe-oF-only instance.
# Export TRUENAS_API_KEY before starting scale-csi.
driver: csi.scale.io
driverInstanceId: csi.scale.io@tank/k8s/nvmeof

fencing:
  mode: "off"
  startupReconcileTimeout: 10m
  staleRecordGracePeriod: 10m

truenas:
  protocol: https
  host: truenas.example.com
  port: 443
  apiKey: $TRUENAS_API_KEY
  allowInsecure: false
  requestTimeout: 60
  connectTimeout: 10
  writeTimeout: 30
  maxConcurrentRequests: 10

zfs:
  datasetParentName: tank/k8s/nvmeof
  zvolBlocksize: 16K
  zvolEnableReservation: false
  datasetProperties:
    compression: zstd
  destroyForeignSnapshotsOnDelete: false

nvmeof:
  enabled: true
  transport: tcp
  transportAddress: truenas.example.com
  transportServiceId: 4420
  subsystemAllowAnyHost: false
  # Replace this with `nvme show-hostnqn` output from every eligible node.
  subsystemHosts:
    - nqn.2014-08.org.nvmexpress:uuid:00000000-0000-0000-0000-000000000001
  deviceWaitTimeout: 60
  commandTimeout: 30
