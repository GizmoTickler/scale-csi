{{- $root := . -}}
{{- $classes := .Values.storageClasses -}}
{{- if .Values.storageClass -}}
  {{- /* The legacy defaults deliberately omit "protocol" so the deprecated path
       shares the modern omit-when-unset behavior below: a protocol is emitted
       only when the values entry sets one. Defaulting it to nfs here would
       silently force nfs on an iscsi/nvmeof class. */}}
  {{- $legacy := mergeOverwrite (dict "create" true "name" "scale-nfs" "isDefault" false "reclaimPolicy" "Delete" "allowVolumeExpansion" true "volumeBindingMode" "Immediate" "mountOptions" (list "nfsvers=4" "noatime") "extraParameters" (dict)) (deepCopy .Values.storageClass) -}}
  {{- if $legacy.create -}}
    {{- $classes = list $legacy -}}
  {{- else -}}
    {{- $classes = list -}}
  {{- end -}}
{{- end -}}
{{- range $index, $storageClass := $classes }}
{{- if $index }}
---
{{- end }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ $storageClass.name }}
  labels:
    {{- include "scale-csi.labels" $root | nindent 4 }}
  {{- if $storageClass.isDefault }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
provisioner: {{ include "scale-csi.driverName" $root }}
reclaimPolicy: {{ default "Delete" $storageClass.reclaimPolicy }}
volumeBindingMode: {{ default "Immediate" $storageClass.volumeBindingMode }}
allowVolumeExpansion: {{ if hasKey $storageClass "allowVolumeExpansion" }}{{ $storageClass.allowVolumeExpansion }}{{ else }}true{{ end }}
{{- with $storageClass.mountOptions }}
mountOptions:
  {{- toYaml . | nindent 2 }}
{{- end }}
parameters:
  {{- $parameters := dict -}}
  {{- with $storageClass.extraParameters }}
    {{- $parameters = mergeOverwrite $parameters (deepCopy .) -}}
  {{- end }}
  {{- /* Emit protocol only when the storageClass entry sets it explicitly.
       Omitting it lets the driver apply its sole-enabled-protocol fallback or
       return its missing-parameter error, instead of the chart silently forcing
       nfs on an iscsi/nvmeof class. */}}
  {{- if $storageClass.protocol }}
  {{- $_ := set $parameters "protocol" $storageClass.protocol -}}
  {{- end }}
  {{- toYaml $parameters | nindent 2 }}
{{- end }}
