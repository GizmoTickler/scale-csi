{{- $root := . -}}
{{- $classes := .Values.storageClasses -}}
{{- if .Values.storageClass -}}
  {{- $legacy := mergeOverwrite (dict "create" true "name" "scale-nfs" "protocol" "nfs" "isDefault" false "reclaimPolicy" "Delete" "allowVolumeExpansion" true "volumeBindingMode" "Immediate" "mountOptions" (list "nfsvers=4" "noatime") "extraParameters" (dict)) (deepCopy .Values.storageClass) -}}
  {{- if $legacy.create -}}
    {{- $classes = list $legacy -}}
  {{- else -}}
    {{- $classes = list -}}
  {{- end -}}
{{- end -}}
{{- range $index, $storageClass := $classes }}
{{- if $index }}
---
{{- end }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ $storageClass.name }}
  labels:
    {{- include "scale-csi.labels" $root | nindent 4 }}
  {{- if $storageClass.isDefault }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
provisioner: {{ include "scale-csi.driverName" $root }}
reclaimPolicy: {{ default "Delete" $storageClass.reclaimPolicy }}
volumeBindingMode: {{ default "Immediate" $storageClass.volumeBindingMode }}
allowVolumeExpansion: {{ if hasKey $storageClass "allowVolumeExpansion" }}{{ $storageClass.allowVolumeExpansion }}{{ else }}true{{ end }}
{{- with $storageClass.mountOptions }}
mountOptions:
  {{- toYaml . | nindent 2 }}
{{- end }}
parameters:
  {{- $secretName := include "scale-csi.secretName" $root -}}
  {{- $parameters := dict
      "csi.storage.k8s.io/provisioner-secret-name" $secretName
      "csi.storage.k8s.io/provisioner-secret-namespace" $root.Release.Namespace
      "csi.storage.k8s.io/controller-publish-secret-name" $secretName
      "csi.storage.k8s.io/controller-publish-secret-namespace" $root.Release.Namespace
      "csi.storage.k8s.io/node-stage-secret-name" $secretName
      "csi.storage.k8s.io/node-stage-secret-namespace" $root.Release.Namespace
      "csi.storage.k8s.io/node-publish-secret-name" $secretName
      "csi.storage.k8s.io/node-publish-secret-namespace" $root.Release.Namespace
      "csi.storage.k8s.io/controller-expand-secret-name" $secretName
      "csi.storage.k8s.io/controller-expand-secret-namespace" $root.Release.Namespace
  -}}
  {{- with $storageClass.extraParameters }}
    {{- $parameters = mergeOverwrite $parameters (deepCopy .) -}}
  {{- end }}
  {{- $_ := set $parameters "protocol" (default "nfs" $storageClass.protocol) -}}
  {{- toYaml $parameters | nindent 2 }}
{{- end }}
