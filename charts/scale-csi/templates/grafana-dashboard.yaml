{{- if .Values.metrics.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "scale-csi.fullname" . }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scale-csi.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  {{- with .Values.metrics.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  scale-csi.json: |-
    {
      "annotations":{"list":[{"builtIn":1,"datasource":{"type":"grafana","uid":"-- Grafana --"},"enable":true,"hide":true,"iconColor":"rgba(0, 211, 255, 1)","name":"Annotations & Alerts","type":"dashboard"}]},
      "description":"scale-csi TrueNAS CSI driver — health, CSI operations, TrueNAS API, sessions, and orphan reconciliation",
      "editable":true,
      "graphTooltip":1,
      "panels":[
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"Controller WebSocket API connectivity to TrueNAS","fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"mappings":[{"options":{"0":{"color":"red","index":0,"text":"DOWN"},"1":{"color":"green","index":1,"text":"OK"}},"type":"value"}],"thresholds":{"mode":"absolute","steps":[{"color":"red"},{"color":"green","value":1}]},"unit":"short"},"overrides":[]},"gridPos":{"h":5,"w":4,"x":0,"y":0},"id":1,"options":{"colorMode":"background","graphMode":"none","justifyMode":"auto","orientation":"auto","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"textMode":"auto"},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"max(scale_csi_truenas_connection_status{job=\"{{ include "scale-csi.fullname" . }}-controller-metrics\"})","refId":"A"}],"title":"TrueNAS Connection","type":"stat"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"TrueNAS API circuit breaker state reported by the controller","fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"mappings":[{"options":{"0":{"color":"green","index":0,"text":"CLOSED"},"1":{"color":"red","index":1,"text":"OPEN"},"2":{"color":"yellow","index":2,"text":"HALF-OPEN"}},"type":"value"}],"thresholds":{"mode":"absolute","steps":[{"color":"green"},{"color":"red","value":1}]},"unit":"short"},"overrides":[]},"gridPos":{"h":5,"w":4,"x":4,"y":0},"id":2,"options":{"colorMode":"background","graphMode":"none","justifyMode":"auto","orientation":"auto","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"textMode":"auto"},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"max(scale_csi_circuit_breaker_state{job=\"{{ include "scale-csi.fullname" . }}-controller-metrics\"})","refId":"A"}],"title":"Circuit Breaker","type":"stat"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"TrueNAS volumes with no matching live Kubernetes PV handle","fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"mappings":[],"thresholds":{"mode":"absolute","steps":[{"color":"green"},{"color":"orange","value":1}]},"unit":"short"},"overrides":[]},"gridPos":{"h":5,"w":4,"x":8,"y":0},"id":3,"options":{"colorMode":"background","graphMode":"none","justifyMode":"auto","orientation":"auto","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"textMode":"auto"},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"max(scale_csi_orphan_volumes{job=\"{{ include "scale-csi.fullname" . }}-controller-metrics\"}) or vector(0)","refId":"A"}],"title":"Orphan Volumes","type":"stat"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"TrueNAS snapshots with no matching live VolumeSnapshotContent handle","fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"mappings":[],"thresholds":{"mode":"absolute","steps":[{"color":"green"},{"color":"orange","value":1}]},"unit":"short"},"overrides":[]},"gridPos":{"h":5,"w":4,"x":12,"y":0},"id":4,"options":{"colorMode":"background","graphMode":"none","justifyMode":"auto","orientation":"auto","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"textMode":"auto"},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"max(scale_csi_orphan_snapshots{job=\"{{ include "scale-csi.fullname" . }}-controller-metrics\"}) or vector(0)","refId":"A"}],"title":"Orphan Snapshots","type":"stat"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"VolSync restore leftovers awaiting garbage collection","fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"mappings":[],"thresholds":{"mode":"absolute","steps":[{"color":"green"},{"color":"orange","value":1}]},"unit":"short"},"overrides":[]},"gridPos":{"h":5,"w":4,"x":16,"y":0},"id":5,"options":{"colorMode":"background","graphMode":"none","justifyMode":"auto","orientation":"auto","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"textMode":"auto"},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"max(scale_csi_spent_restore_snapshots{job=\"{{ include "scale-csi.fullname" . }}-controller-metrics\"}) or vector(0)","refId":"A"}],"title":"Spent Restore Snaps","type":"stat"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"PVCs using any StorageClass provisioned by this scale-csi driver","fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"mappings":[],"thresholds":{"mode":"absolute","steps":[{"color":"green"}]},"unit":"short"},"overrides":[]},"gridPos":{"h":5,"w":4,"x":20,"y":0},"id":6,"options":{"colorMode":"background","graphMode":"none","justifyMode":"auto","orientation":"auto","reduceOptions":{"calcs":["lastNotNull"],"fields":"","values":false},"textMode":"auto"},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"count(kube_persistentvolumeclaim_info * on (storageclass) group_left() kube_storageclass_info{provisioner=\"{{ include "scale-csi.driverName" . }}\"})","refId":"A"}],"title":"scale-csi PVCs","type":"stat"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"CSI RPC rate by operation","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"ops"},"overrides":[]},"gridPos":{"h":9,"w":12,"x":0,"y":5},"id":10,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"sum by (operation) (rate(scale_csi_operations_total[$__rate_interval])) > 0","legendFormat":"{{`{{operation}}`}}","refId":"A"}],"title":"CSI Operations Rate","type":"timeseries"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"CSI RPC latency percentiles by operation","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"s"},"overrides":[]},"gridPos":{"h":9,"w":12,"x":12,"y":5},"id":11,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"histogram_quantile(0.50, sum by (operation, le) (rate(scale_csi_operations_duration_seconds_bucket[$__rate_interval]))) > 0","legendFormat":"{{`{{operation}}`}} p50","refId":"A"},{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"histogram_quantile(0.95, sum by (operation, le) (rate(scale_csi_operations_duration_seconds_bucket[$__rate_interval]))) > 0","legendFormat":"{{`{{operation}}`}} p95","refId":"B"},{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"histogram_quantile(0.99, sum by (operation, le) (rate(scale_csi_operations_duration_seconds_bucket[$__rate_interval]))) > 0","legendFormat":"{{`{{operation}}`}} p99","refId":"C"}],"title":"CSI Operation Latency (p50 / p95 / p99)","type":"timeseries"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"Error rate excluding benign retry and idempotency codes","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"ops"},"overrides":[]},"gridPos":{"h":9,"w":12,"x":0,"y":14},"id":12,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"sum by (operation, code) (rate(scale_csi_operations_total{status=\"error\",code!~\"Aborted|NotFound|AlreadyExists\"}[$__rate_interval]))","legendFormat":"{{`{{operation}}`}} {{`{{code}}`}}","refId":"A"}],"title":"CSI Operation Errors","type":"timeseries"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"TrueNAS WebSocket API call rate by method","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"reqps"},"overrides":[]},"gridPos":{"h":9,"w":12,"x":12,"y":14},"id":13,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"topk(10, sum by (method) (rate(scale_csi_truenas_requests_total[$__rate_interval]))) > 0","legendFormat":"{{`{{method}}`}}","refId":"A"}],"title":"TrueNAS API Request Rate (top 10)","type":"timeseries"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"Fraction of TrueNAS API requests returning errors","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"percentunit"},"overrides":[]},"gridPos":{"h":8,"w":12,"x":0,"y":23},"id":14,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"sum(rate(scale_csi_truenas_requests_total{status=\"error\"}[$__rate_interval])) / sum(rate(scale_csi_truenas_requests_total[$__rate_interval]))","legendFormat":"error rate","refId":"A"}],"title":"TrueNAS API Error Rate","type":"timeseries"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"Live iSCSI and NVMe-oF sessions per node plugin","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"short"},"overrides":[]},"gridPos":{"h":8,"w":12,"x":12,"y":23},"id":15,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"sum by (pod) (scale_csi_iscsi_sessions_total)","legendFormat":"iSCSI {{`{{pod}}`}}","refId":"A"},{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"sum by (pod) (scale_csi_nvme_sessions_total)","legendFormat":"NVMe {{`{{pod}}`}}","refId":"B"}],"title":"Block Sessions by Node","type":"timeseries"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"Node transport connection attempts and garbage-collected orphan sessions","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"ops"},"overrides":[]},"gridPos":{"h":8,"w":12,"x":0,"y":31},"id":16,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"sum by (transport, result) (rate(scale_csi_node_connect_total[$__rate_interval]))","legendFormat":"connect {{`{{transport}}`}} {{`{{result}}`}}","refId":"A"},{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"sum by (transport) (rate(scale_csi_gc_sessions_disconnected_total[$__rate_interval]))","legendFormat":"GC disconnect {{`{{transport}}`}}","refId":"B"}],"title":"Node Connects / GC Disconnects","type":"timeseries"},
        {"datasource":{"type":"prometheus","uid":"$datasource"},"description":"Space held by detected orphan volumes and snapshots","fieldConfig":{"defaults":{"color":{"mode":"palette-classic"},"custom":{"drawStyle":"line","fillOpacity":10,"lineWidth":1,"pointSize":5,"showPoints":"never","spanNulls":false,"stacking":{"group":"A","mode":"none"}},"mappings":[],"unit":"bytes"},"overrides":[]},"gridPos":{"h":8,"w":12,"x":12,"y":31},"id":17,"options":{"legend":{"calcs":["mean","max"],"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"max(scale_csi_orphan_volumes_bytes{job=\"{{ include "scale-csi.fullname" . }}-controller-metrics\"}) or vector(0)","legendFormat":"volumes","refId":"A"},{"datasource":{"type":"prometheus","uid":"$datasource"},"expr":"max(scale_csi_orphan_snapshots_bytes{job=\"{{ include "scale-csi.fullname" . }}-controller-metrics\"}) or vector(0)","legendFormat":"snapshots","refId":"B"}],"title":"Orphan Bytes","type":"timeseries"}
      ],
      "refresh":"30s",
      "schemaVersion":41,
      "tags":["scale-csi","storage","truenas"],
      "templating":{"list":[{"current":{},"description":"Prometheus datasource","includeAll":false,"label":"Datasource","name":"datasource","options":[],"query":"prometheus","refresh":1,"regex":"","type":"datasource"}]},
      "time":{"from":"now-6h","to":"now"},
      "timezone":"browser",
      "title":"scale-csi — TrueNAS CSI Driver",
      "uid":"scale-csi",
      "version":1
    }
{{- end }}
