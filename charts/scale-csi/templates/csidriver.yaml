apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: {{ include "scale-csi.driverName" . }}
  labels:
    {{- include "scale-csi.labels" . | nindent 4 }}
spec:
  # These fields are immutable after the CSIDriver is created.
  # Indicates the driver requires an attach operation
  attachRequired: true
  # Requests pod information in NodePublishVolume calls
  podInfoOnMount: true
  # Storage capacity tracking
  storageCapacity: false
  # Volume lifecycle modes
  volumeLifecycleModes:
    - Persistent
  # FS group policy
  fsGroupPolicy: File
