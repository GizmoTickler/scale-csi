{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scale-csi.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scale-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  # Render an explicit strategy in BOTH fencing modes so Helm always owns the
  # field. Off mode previously rendered no strategy block, so the API server
  # defaulted RollingUpdate and Helm's three-way merge never managed it; the
  # off -> additive upgrade then failed in production (2026-07-22) because the
  # server-defaulted rollingUpdate residue made the Recreate strategy invalid.
  {{- if eq .Values.fencing.mode "off" }}
  # Off mode allows overlapping controllers during a rollout. RollingUpdate is
  # the Kubernetes default, declared explicitly (with its default surge and
  # unavailable) so the field is Helm-owned and the additive upgrade can replace
  # it cleanly.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  {{- else }}
  # Fencing reconcilers are in-process singleton writers. Recreate prevents an
  # old and new controller pod from overlapping during a rollout.
  strategy:
    type: Recreate
    # Explicit null removes a live Deployment's server-defaulted RollingUpdate
    # field during the required off -> additive Helm upgrade. Leaving that
    # three-way-merge residue would make the Recreate strategy invalid.
    rollingUpdate: null
  {{- end }}
  selector:
    matchLabels:
      {{- include "scale-csi.controllerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scale-csi.controllerSelectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.truenas.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "scale-csi.controllerServiceAccountName" . }}
      priorityClassName: {{ .Values.controller.priorityClassName }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.controller.affinity }}
      affinity:
        {{- toYaml .Values.controller.affinity | nindent 8 }}
      {{- else }}
      {{- if gt (int .Values.controller.replicas) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "scale-csi.controllerSelectorLabels" . | nindent 20 }}
      {{- end }}
      {{- end }}
      containers:
        # CSI Driver
        - name: scale-csi
          image: {{ include "scale-csi.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.controller.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - "-endpoint=unix://{{ include "scale-csi.socketPath" . }}"
            - "-node-id=$(NODE_ID)"
            - "-driver-name={{ .Values.csiDriverName }}"
            - "-config=/etc/scale-csi/config.yaml"
            - "-mode=controller"
            - "-health-port={{ .Values.metrics.port }}"
            - "-v={{ .Values.logging.verbosity }}"
          ports:
            - name: health
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if or .Values.truenas.apiKey .Values.truenas.existingSecret }}
            - name: TRUENAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "scale-csi.secretName" . }}
                  key: api-key
                  optional: true
            {{- end }}
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ include "scale-csi.socketDir" . }}
            - name: config
              mountPath: /etc/scale-csi
              readOnly: true
            {{- with .Values.controller.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9808
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3

        # CSI Provisioner
        - name: csi-provisioner
          image: {{ .Values.sidecars.provisioner.image }}
          args:
            - "--csi-address={{ include "scale-csi.socketPath" . }}"
            - "--v={{ .Values.logging.verbosity }}"
            - "--timeout={{ .Values.sidecars.provisioner.timeout }}"
            - "--worker-threads={{ .Values.sidecars.provisioner.workerThreads }}"
            # Leader election is always enabled, even at a single replica: a
            # fencing-off RollingUpdate transiently runs two controller pods, and
            # without LE both sidecars would act as active provisioner/attacher.
            - "--leader-election"
            - "--leader-election-namespace={{ .Release.Namespace }}"
            - "--leader-election-lease-duration={{ .Values.sidecars.leaderElection.leaseDuration }}"
            - "--leader-election-renew-deadline={{ .Values.sidecars.leaderElection.renewDeadline }}"
            - "--leader-election-retry-period={{ .Values.sidecars.leaderElection.retryPeriod }}"
            - "--extra-create-metadata"
            {{- range .Values.sidecars.provisioner.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ include "scale-csi.socketDir" . }}
          resources:
            {{- toYaml .Values.sidecars.provisioner.resources | nindent 12 }}

        # CSI Attacher
        - name: csi-attacher
          image: {{ .Values.sidecars.attacher.image }}
          args:
            - "--csi-address={{ include "scale-csi.socketPath" . }}"
            - "--v={{ .Values.logging.verbosity }}"
            - "--timeout={{ .Values.sidecars.attacher.timeout }}"
            - "--worker-threads={{ .Values.sidecars.attacher.workerThreads }}"
            - "--leader-election"
            - "--leader-election-namespace={{ .Release.Namespace }}"
            - "--leader-election-lease-duration={{ .Values.sidecars.leaderElection.leaseDuration }}"
            - "--leader-election-renew-deadline={{ .Values.sidecars.leaderElection.renewDeadline }}"
            - "--leader-election-retry-period={{ .Values.sidecars.leaderElection.retryPeriod }}"
            {{- range .Values.sidecars.attacher.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ include "scale-csi.socketDir" . }}
          resources:
            {{- toYaml .Values.sidecars.attacher.resources | nindent 12 }}

        # CSI Resizer
        - name: csi-resizer
          image: {{ .Values.sidecars.resizer.image }}
          args:
            - "--csi-address={{ include "scale-csi.socketPath" . }}"
            - "--v={{ .Values.logging.verbosity }}"
            - "--timeout={{ .Values.sidecars.resizer.timeout }}"
            - "--workers={{ .Values.sidecars.resizer.workerThreads }}"
            - "--leader-election"
            - "--leader-election-namespace={{ .Release.Namespace }}"
            - "--leader-election-lease-duration={{ .Values.sidecars.leaderElection.leaseDuration }}"
            - "--leader-election-renew-deadline={{ .Values.sidecars.leaderElection.renewDeadline }}"
            - "--leader-election-retry-period={{ .Values.sidecars.leaderElection.retryPeriod }}"
            - "--handle-volume-inuse-error=false"
            {{- range .Values.sidecars.resizer.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ include "scale-csi.socketDir" . }}
          resources:
            {{- toYaml .Values.sidecars.resizer.resources | nindent 12 }}

        # CSI Snapshotter
        - name: csi-snapshotter
          image: {{ .Values.sidecars.snapshotter.image }}
          args:
            - "--csi-address={{ include "scale-csi.socketPath" . }}"
            - "--v={{ .Values.logging.verbosity }}"
            - "--timeout={{ .Values.sidecars.snapshotter.timeout }}"
            - "--worker-threads={{ .Values.sidecars.snapshotter.workerThreads }}"
            - "--leader-election"
            - "--leader-election-namespace={{ .Release.Namespace }}"
            - "--leader-election-lease-duration={{ .Values.sidecars.leaderElection.leaseDuration }}"
            - "--leader-election-renew-deadline={{ .Values.sidecars.leaderElection.renewDeadline }}"
            - "--leader-election-retry-period={{ .Values.sidecars.leaderElection.retryPeriod }}"
            {{- range .Values.sidecars.snapshotter.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: socket-dir
              mountPath: {{ include "scale-csi.socketDir" . }}
          resources:
            {{- toYaml .Values.sidecars.snapshotter.resources | nindent 12 }}

        # Liveness Probe
        - name: liveness-probe
          image: {{ .Values.sidecars.livenessProbe.image }}
          args:
            - "--csi-address={{ include "scale-csi.socketPath" . }}"
            - "--probe-timeout=3s"
            - "--health-port=9808"
            - "--v={{ .Values.logging.verbosity }}"
          volumeMounts:
            - name: socket-dir
              mountPath: {{ include "scale-csi.socketDir" . }}
          resources:
            {{- toYaml .Values.sidecars.livenessProbe.resources | nindent 12 }}

      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "scale-csi.fullname" . }}-config
        {{- with .Values.controller.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
