{{- if .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "scale-csi.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scale-csi.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ include "scale-csi.fullname" . }}.rules
      rules:
        {{- if .Values.metrics.prometheusRule.rules }}
        {{- toYaml .Values.metrics.prometheusRule.rules | nindent 8 }}
        {{- else }}
        - alert: ScaleCSIControllerDown
          expr: absent(up{namespace={{ .Release.Namespace | quote }},service={{ printf "%s-controller-metrics" (include "scale-csi.fullname" .) | quote }}} == 1)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Scale CSI controller metrics target is down
            description: Prometheus has not observed an up Scale CSI controller target for five minutes.
        - alert: ScaleCSICircuitBreakerOpen
          expr: scale_csi_circuit_breaker_state == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: Scale CSI TrueNAS circuit breaker is open
            description: The driver has stopped TrueNAS API calls while the circuit breaker is open.
        - alert: ScaleCSITrueNASConnectionDown
          expr: max(scale_csi_truenas_connection_status{job={{ printf "%s-controller-metrics" (include "scale-csi.fullname" .) | quote }}}) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Scale CSI controller is disconnected from TrueNAS
            description: The controller has reported no authenticated TrueNAS connection for five minutes.
        - alert: ScaleCSIHighTrueNASAPIFailureRate
          expr: (sum(rate(scale_csi_truenas_requests_total{status="error"}[5m])) / sum(rate(scale_csi_truenas_requests_total[5m]))) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Scale CSI TrueNAS API failure rate is high
            description: More than 10% of TrueNAS API requests have failed for ten minutes.
        - alert: ScaleCSIOperationErrorsSustained
          expr: sum(rate(scale_csi_operations_total{job={{ printf "%s-controller-metrics" (include "scale-csi.fullname" .) | quote }},status="error",code!~"FailedPrecondition|AlreadyExists|Aborted"}[10m])) > 0.02
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Scale CSI operations are failing
            description: Unexpected CSI controller operation errors have exceeded 0.02 operations per second for fifteen minutes.
        - alert: ScaleCSISpentRestoreSnapshotBacklog
          expr: max(scale_csi_spent_restore_snapshots{job={{ printf "%s-controller-metrics" (include "scale-csi.fullname" .) | quote }}}) > 0
          for: 48h
          labels:
            severity: warning
          annotations:
            summary: Scale CSI spent restore snapshots remain queued
            description: One or more spent restore snapshots have remained pending cleanup for forty-eight hours.
        - alert: ScaleCSISessionGCDisconnects
          expr: increase(scale_csi_gc_sessions_disconnected_total{job={{ printf "%s-node-metrics" (include "scale-csi.fullname" .) | quote }}}[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Scale CSI garbage-collected storage sessions
            description: A node plugin disconnected at least one orphaned iSCSI or NVMe-oF session in the last hour.
        {{- if .Values.reconcile.enabled }}
        - alert: ScaleCSIOrphanVolumesDetected
          expr: scale_csi_orphan_volumes > 0
          for: {{ .Values.reconcile.alertAfter }}
          labels:
            severity: warning
          annotations:
            summary: Scale CSI orphan volumes detected
            description: CSI-managed TrueNAS volumes have had no matching live Kubernetes PV handle for longer than the reconcile alert window.
        - alert: ScaleCSIOrphanSnapshotsDetected
          expr: scale_csi_orphan_snapshots > 0
          for: {{ .Values.reconcile.alertAfter }}
          labels:
            severity: warning
          annotations:
            summary: Scale CSI orphan snapshots detected
            description: CSI-managed TrueNAS snapshots have had no matching live VolumeSnapshotContent handle for longer than the reconcile alert window.
        {{- end }}
        {{- end }}
{{- end }}
