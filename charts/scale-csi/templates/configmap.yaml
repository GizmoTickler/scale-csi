apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "scale-csi.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scale-csi.labels" . | nindent 4 }}
data:
  config.yaml: |
    # CSI Driver configuration
    driver: {{ .Values.csiDriverName }}

    # TrueNAS connection settings
    truenas:
      host: {{ .Values.truenas.host | quote }}
      port: {{ .Values.truenas.port }}
      protocol: {{ if .Values.truenas.secure }}https{{ else }}http{{ end }}
      apiKey: $TRUENAS_API_KEY
      allowInsecure: {{ .Values.truenas.skipTLSVerify }}
      caCert: {{ .Values.truenas.caCert | quote }}
      caCertFile: {{ .Values.truenas.caCertFile | quote }}
      requestTimeout: {{ .Values.truenas.requestTimeout | default 60 }}
      connectTimeout: {{ .Values.truenas.connectTimeout }}
      writeTimeout: {{ .Values.truenas.writeTimeout | default 30 }}
      maxConcurrentRequests: {{ .Values.truenas.maxConcurrentRequests | default 10 }}

    # ZFS dataset configuration
    zfs:
      datasetParentName: {{ .Values.zfs.parentDataset | quote }}
      detachedSnapshotsDatasetParentName: {{ .Values.zfs.detachedSnapshotsDatasetParentName | quote }}
      datasetEnableQuotas: {{ .Values.zfs.enforceQuota }}
      datasetEnableReservation: false
      {{- with .Values.zfs.datasetProperties }}
      datasetProperties:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      zvolBlocksize: {{ .Values.zfs.zvolBlocksize | quote }}
      zvolReadyTimeout: {{ .Values.zfs.zvolReadyTimeout | default 60 }}
      destroyForeignSnapshotsOnDelete: {{ .Values.zfs.destroyForeignSnapshotsOnDelete }}

    {{- if .Values.nfs.enabled }}
    # NFS configuration
    nfs:
      enabled: true
      shareHost: {{ .Values.nfs.server | default .Values.truenas.host | quote }}
      shareAllowedNetworks:
        {{- toYaml .Values.nfs.shareAllowedNetworks | nindent 8 }}
      shareAllowedHosts: []
      shareMaprootUser: {{ .Values.nfs.shareMaprootUser | quote }}
      shareMaprootGroup: {{ .Values.nfs.shareMaprootGroup | quote }}
      shareMapallUser: {{ .Values.nfs.shareMapallUser | quote }}
      shareMapallGroup: {{ .Values.nfs.shareMapallGroup | quote }}
    {{- end }}

    {{- if .Values.iscsi.enabled }}
    # iSCSI configuration
    iscsi:
      enabled: true
      {{- $portal := .Values.iscsi.portal | default .Values.truenas.host }}
      {{- if not (contains ":" $portal) }}
      {{- $portal = printf "%s:%d" $portal (.Values.iscsi.portalPort | default 3260 | int) }}
      {{- end }}
      targetPortal: {{ $portal | quote }}
      targetPortals:
        {{- toYaml .Values.iscsi.targetPortals | nindent 8 }}
      interface: "default"
      namePrefix: {{ .Values.iscsi.namePrefix | quote }}
      {{- if .Values.iscsi.targetGroups }}
      # Explicit portal/initiator group IDs (install-specific TrueNAS database
      # ids). When omitted, the driver resolves them automatically from
      # targetPortal and an allow-all initiator group.
      targetGroups:
        {{- toYaml .Values.iscsi.targetGroups | nindent 8 }}
      {{- end }}

      extentBlocksize: {{ .Values.iscsi.extentBlocksize }}
      extentRpm: {{ .Values.iscsi.extentRpm | quote }}
      extentAvailThreshold: {{ .Values.iscsi.extentAvailThreshold }}
      deviceWaitTimeout: {{ .Values.iscsi.deviceWaitTimeout | default 60 }}
      serviceReloadDebounce: {{ .Values.iscsi.serviceReloadDebounce | default 2000 }}
    {{- end }}

    {{- if .Values.nvmeof.enabled }}
    # NVMe-oF configuration
    nvmeof:
      enabled: true
      transport: {{ .Values.nvmeof.transport | default "tcp" | quote }}
      transportAddress: {{ .Values.nvmeof.address | default .Values.truenas.host | quote }}
      transportServiceId: {{ .Values.nvmeof.port | default 4420 }}
      subsystemHosts:
        {{- toYaml .Values.nvmeof.subsystemHosts | nindent 8 }}
      subsystemAllowAnyHost: {{ .Values.nvmeof.subsystemAllowAnyHost }}
      commandTimeout: {{ .Values.nvmeof.commandTimeout }}
    {{- end }}

    # Session garbage collection (node plugin only)
    sessionGC:
      enabled: {{ .Values.sessionGC.enabled }}
      interval: {{ .Values.sessionGC.interval }}
      gracePeriod: {{ .Values.sessionGC.gracePeriod | default 60 }}
      dryRun: {{ .Values.sessionGC.dryRun }}
      runOnStartup: {{ .Values.sessionGC.runOnStartup }}
      startupDelay: {{ .Values.sessionGC.startupDelay }}
      iscsiEnabled: {{ .Values.sessionGC.iscsiEnabled }}
      nvmeofEnabled: {{ .Values.sessionGC.nvmeofEnabled }}

    node:
      sessionCleanupDelay: {{ .Values.node.sessionCleanupDelay }}
      maxVolumesPerNode: {{ .Values.node.maxVolumesPerNode }}

    resilience:
      circuitBreaker:
        enabled: {{ .Values.resilience.circuitBreaker.enabled }}
        failureThreshold: {{ .Values.resilience.circuitBreaker.failureThreshold }}
        timeout: {{ .Values.resilience.circuitBreaker.timeout }}
      retry:
        maxAttempts: {{ .Values.resilience.retry.maxAttempts }}
        initialDelay: {{ .Values.resilience.retry.initialDelay }}
        maxDelay: {{ .Values.resilience.retry.maxDelay }}
        backoffMultiplier: {{ .Values.resilience.retry.backoffMultiplier }}
      rateLimiting:
        maxConcurrentRequests: {{ .Values.resilience.rateLimiting.maxConcurrentRequests }}
        maxConcurrentLogins: {{ .Values.resilience.rateLimiting.maxConcurrentLogins }}

    commandTimeouts:
      mount: {{ .Values.commandTimeouts.mount }}
      format: {{ .Values.commandTimeouts.format }}
      iscsi: {{ .Values.commandTimeouts.iscsi }}
      nvme: {{ .Values.commandTimeouts.nvme }}
