# Scale CSI Driver Helm Chart Values

# CSI Driver name (should match the driver name in StorageClass)
csiDriverName: csi.scale.io

# Stable ownership identity stamped on newly-created datasets/zvols. Empty
# derives "<csiDriverName>@<zfs.parentDataset>". Never change this for an
# existing installation unless the matching datasets are deliberately adopted.
driverInstanceId: ""

# Backend publication fencing defaults off. For upgrades, roll the node image
# first, wait for every CSINode to re-register, then select "additive". Select
# "strict" only after the deferred-fencing metric remains zero.
fencing:
  mode: "off"
  # Timeout for one background startup convergence attempt. Failures retry.
  startupReconcileTimeout: 10m
  # Continuous VolumeAttachment absence required before a stale publication
  # record left by a force-removed VA finalizer can be revoked.
  staleRecordGracePeriod: 10m

# Image configuration
image:
  repository: ghcr.io/gizmotickler/scale-csi
  tag: ""  # Defaults to v<Chart.appVersion> (matches the v-prefixed published image)
  # Optional immutable manifest digest. When set, digest takes precedence over tag.
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Controller configuration (runs as Deployment)
controller:
  enabled: true
  # Additive/strict fencing requires exactly one non-overlapping controller
  # writer; the chart uses Recreate rollouts in those modes.
  replicas: 1

  # Priority class for controller pods
  priorityClassName: system-cluster-critical

  # Render a PodDisruptionBudget only when replicas is greater than 1.
  podDisruptionBudget:
    enabled: true
    # Set maxUnavailable to "" when using minAvailable.
    minAvailable: ""
    maxUnavailable: 1

  # Security context for the controller driver container
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # Resource requests/limits for the controller driver container
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 256Mi

  # Node selector for controller pod
  nodeSelector: {}

  # Tolerations for controller pod
  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  # Affinity rules. When empty and replicas > 1, the chart supplies preferred
  # hostname anti-affinity; any explicit map replaces that default.
  affinity: {}

  # Additional environment variables
  extraEnv: []

  # Additional volume mounts
  extraVolumeMounts: []

  # Additional volumes
  extraVolumes: []

# Node configuration (runs as DaemonSet)
node:
  enabled: true

  # Priority class for node pods
  priorityClassName: system-node-critical

  # Delay in milliseconds before retrying after stale session cleanup
  sessionCleanupDelay: 500

  # Maximum volumes Kubernetes may schedule to one node. Zero means unlimited
  # and preserves the CSI field's unset behavior.
  maxVolumesPerNode: 0

  # Resource requests/limits for the node driver container
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 256Mi

  # Node selector for node pods
  nodeSelector: {}

  # Tolerations for node pods (allow scheduling on all nodes)
  tolerations:
    - operator: Exists

  # Affinity rules
  affinity: {}

  # Additional environment variables
  extraEnv: []

  # Additional volume mounts
  extraVolumeMounts: []

  # Additional volumes
  extraVolumes: []

# Host kubelet directory used for CSI sockets and registration
kubeletDir: /var/lib/kubelet

# TrueNAS connection configuration
truenas:
  # TrueNAS host (required — the driver refuses to start without it)
  host: ""

  # API port (80 for HTTP, 443 for HTTPS)
  port: 443

  # Use HTTPS
  secure: true

  # Skip TLS verification (not recommended for production)
  skipTLSVerify: false

  # Optional PEM-encoded CA certificate for verifying the TrueNAS API.
  # When set, this explicit trust bundle is used instead of system roots.
  caCert: ""

  # Optional path to a mounted PEM-encoded CA certificate file.
  caCertFile: ""

  # API key authentication (recommended; required unless existingSecret is set —
  # the driver refuses to start without one)
  apiKey: ""

  # Use existing secret for credentials
  # Secret must contain the key: api-key
  existingSecret: ""

  # Request timeout in seconds (default: 60)
  requestTimeout: 60

  # Connection establishment timeout in seconds (default: 10)
  connectTimeout: 10

  # WebSocket write timeout in seconds (default: 30)
  writeTimeout: 30

  # Maximum concurrent API requests to TrueNAS (default: 10)
  # Lower this if TrueNAS becomes overloaded with many PVC operations
  maxConcurrentRequests: 10

# ZFS configuration
zfs:
  # Parent dataset for volumes (required — the driver refuses to start without it)
  parentDataset: ""

  # Additional ZFS properties to set on newly created datasets/zvols,
  # e.g. {compression: "zstd", dedup: "off"}. When empty (the default),
  # no properties are set and new datasets inherit from the parent
  # dataset — matching the driver's default behavior.
  datasetProperties: {}

  # Block size for newly-created zvols
  zvolBlocksize: 16K

  # Thick-provision block zvols with a full refreservation. The default keeps
  # zvols sparse/thin-provisioned.
  zvolEnableReservation: false

  # Dataset quota enforcement
  enforceQuota: true

  # Create independent volumes from snapshots using a local ZFS send/receive.
  # Keep false to preserve the existing ZFS clone behavior. Volume-source
  # copies remain clones regardless of this setting.
  detachedVolumesFromSnapshots: false

  # Timeout in seconds for waiting for a zvol to be ready after cloning
  # Increase this for slow systems, heavily loaded TrueNAS, or large clones
  # (default: 60 seconds)
  zvolReadyTimeout: 60

  # Allow DeleteVolume to recursively destroy snapshots not created by the CSI
  # driver. Keep false unless those snapshots are deliberately disposable.
  destroyForeignSnapshotsOnDelete: false

# NFS configuration
nfs:
  # Enable NFS support
  enabled: true

  # NFS server address (defaults to TrueNAS host)
  server: ""

  # Networks allowed to mount dynamically-created shares. An empty list allows
  # all networks and should be restricted in production.
  shareAllowedNetworks: []

  shareMaprootUser: root
  shareMaprootGroup: wheel
  shareMapallUser: ""
  shareMapallGroup: ""

# iSCSI configuration
iscsi:
  # Enable iSCSI support
  enabled: true

  # Target portal address (defaults to TrueNAS host)
  portal: ""

  # Target portal port
  portalPort: 3260

  # Explicit TrueNAS portal/initiator group associations for created targets
  # (install-specific database IDs). Leave empty to let the driver resolve
  # them automatically: it matches the portal listening on `portal` and picks
  # or creates an allow-all initiator group.
  targetGroups: []

  extentBlocksize: 512
  # Disable physical block size reporting on created extents.
  extentDisablePhysicalBlocksize: false
  extentRpm: SSD
  extentAvailThreshold: 0

  # Timeout in seconds to wait for iSCSI device to appear after login
  # Increase this for heavily loaded nodes or slow networks
  deviceWaitTimeout: 60

  # Debounce window in milliseconds for iSCSI service reloads
  # Multiple volume creations within this window will trigger a single reload
  # This prevents reload storms during bulk volume provisioning (default: 2000ms)
  serviceReloadDebounce: 2000

# NVMe-oF configuration
nvmeof:
  # Enable NVMe-oF support
  enabled: false

  # Transport type (tcp, rdma)
  transport: tcp

  # Target address (defaults to TrueNAS host)
  address: ""

  # Target port
  port: 4420

  # Allowed host NQNs. Used when subsystemAllowAnyHost is false. Include the
  # `nvme show-hostnqn` output from every Kubernetes node that may connect
  # (stable per node even when /etc/nvme/hostnqn is absent, e.g. on Flatcar).
  subsystemHosts: []

  # Allow any host NQN to connect. Enabling this bypasses subsystemHosts.
  subsystemAllowAnyHost: false

  # Timeout for nvme CLI commands in seconds
  commandTimeout: 30

# Storage classes to create.
#
# `protocol` is emitted into the StorageClass parameters ONLY when set on an
# entry. Leave it unset to let the driver apply its sole-enabled-protocol
# fallback (single-protocol installs) or return its missing-parameter error
# (multi-protocol installs) instead of the chart silently forcing nfs. The
# bundled default class sets it explicitly.
storageClasses:
  - name: scale-nfs
    protocol: nfs
    isDefault: false
    reclaimPolicy: Delete
    allowVolumeExpansion: true
    volumeBindingMode: Immediate
    mountOptions:
      - nfsvers=4
      - noatime
    # Additional CSI parameters, for example secret references
    extraParameters: {}
  # Opt-in example: a NVMe-oF class that restores snapshots as independent
  # detached copies instead of cheap ZFS clones, for DR-restore use cases where
  # the restored volume must not share blocks (and a snapshot's lifecycle) with
  # its source. Disabled by default so it is never created unless you set
  # `enabled: true` (and enable nvmeof above). The dominant hourly VolSync
  # source-backup mounts should keep the default clone behavior (omit
  # snapshotRestoreMode) to stay cheap.
  - name: scale-nvmeof-detached
    enabled: false
    protocol: nvmeof
    snapshotRestoreMode: detached
    isDefault: false
    reclaimPolicy: Delete
    allowVolumeExpansion: true
    volumeBindingMode: Immediate
    mountOptions: []
    extraParameters: {}

# Deprecated single-StorageClass configuration. When non-empty, this takes
# precedence over storageClasses for compatibility with existing values files.
# mountOptions and protocol are emitted only when explicitly set here.
storageClass: {}

# Optional VolumeSnapshotClass
snapshotClass:
  create: false
  name: scale-csi
  deletionPolicy: Delete
  labels: {}
  annotations: {}

# Sidecar containers versions
sidecars:
  # Leader election configuration for sidecar containers
  # Increase these values if sidecars restart during API server instability
  # IMPORTANT: These values must satisfy: retryPeriod < renewDeadline < leaseDuration
  # The difference (leaseDuration - renewDeadline) determines how long after a failed
  # renewal the leader still holds the lease, giving time for recovery.
  leaderElection:
    # How long a leader lease is valid (default: 60s, upstream default: 15s)
    leaseDuration: 60s
    # How long a leader waits before renewing (default: 40s, upstream default: 10s)
    # Must be less than leaseDuration
    renewDeadline: 40s
    # How often to retry acquiring the lock (default: 10s, upstream default: 5s)
    # Must be less than renewDeadline
    retryPeriod: 10s

  provisioner:
    image: registry.k8s.io/sig-storage/csi-provisioner:v6.3.0
    timeout: 300s
    workerThreads: 10
    extraArgs: []
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

  attacher:
    image: registry.k8s.io/sig-storage/csi-attacher:v4.12.0
    timeout: 300s
    workerThreads: 10
    extraArgs: []
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

  resizer:
    image: registry.k8s.io/sig-storage/csi-resizer:v2.2.1
    timeout: 300s
    workerThreads: 10
    extraArgs: []
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

  snapshotter:
    image: registry.k8s.io/sig-storage/csi-snapshotter:v8.6.0
    timeout: 300s
    workerThreads: 10
    extraArgs: []
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

  nodeDriverRegistrar:
    image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.17.0
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

  livenessProbe:
    image: registry.k8s.io/sig-storage/livenessprobe:v2.19.0
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

# Service account configuration
serviceAccount:
  # Create service accounts
  create: true

  # Annotations for service accounts
  annotations: {}

  # Names to use for created or existing component ServiceAccounts
  controllerName: ""
  nodeName: ""

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# Pod security context
podSecurityContext:
  runAsNonRoot: false  # Required for mount operations
  fsGroup: 0

# Container security context (for node plugin)
securityContext:
  privileged: true
  capabilities:
    add:
      - SYS_ADMIN

# Logging configuration
logging:
  # Verbosity level (0-10, higher is more verbose)
  verbosity: 2

# Metrics and monitoring configuration
metrics:
  # Enable metrics services (creates ClusterIP services for scraping)
  enabled: true

  # Metrics port (must match health-port in driver args)
  port: 9809

  # Service annotations (e.g., for prometheus.io/scrape annotations)
  service:
    annotations: {}

  # ServiceMonitor for Prometheus Operator
  serviceMonitor:
    # Create ServiceMonitor resources
    enabled: false

    # Additional labels for ServiceMonitor (for Prometheus selector)
    labels: {}

    # Scrape interval
    interval: 30s

    # Scrape timeout
    scrapeTimeout: 10s

  # PrometheusRule for driver health and error-rate alerts
  prometheusRule:
    enabled: false
    additionalLabels: {}
    # Replaces the bundled rules when non-empty
    rules: []

  # Grafana sidecar-discoverable dashboard ConfigMap
  dashboards:
    enabled: false
    # ConfigMap annotations such as a Grafana folder selector
    annotations: {}

# Controller-side orphan detection and opt-in guarded cleanup.
reconcile:
  # Driver-owned replication.run_onetime zombie-job cleanup runs on controller
  # startup and every interval regardless of enabled or delete.enabled. The
  # default pass additionally performs detection (updating Prometheus gauges) plus
  # hygiene of the driver's OWN bookkeeping user properties on the parent
  # dataset: stale in-flight creation markers and orphaned tombstone-ledger
  # entries are retired with live staleness proof. Backend OBJECT deletion —
  # volumes, snapshots, tombstone reaping — happens only behind delete.enabled.
  enabled: true

  # Interval between controller reconcile passes (including the job sweep).
  interval: 1h

  # Managed backend objects must be older than this before they are orphaned.
  minOrphanAge: 24h

  # Prometheus alert hold time. Keep this strictly greater than 2x interval.
  alertAfter: 2h5m

  delete:
    # SAFETY: guarded deletion is opt-in and disabled by default. When enabled,
    # a CronJob runs --mode=reconcile and backend cleanup still goes through the
    # driver's existing DeleteVolume/DeleteSnapshot dependency guards.
    #
    # NOTE: on TrueNAS 26.0 (no ZFS deferred destroy) deleting a snapshot that
    # still has a restored clone leaves a driver-tombstoned snapshot behind by
    # design. Reaping those released tombstones is part of this guarded delete
    # pass, so it only happens when delete.enabled is true; with it disabled the
    # backlog stays visible in the scale_csi_tombstone_snapshots{,_bytes}
    # gauges (detection is always on).
    enabled: false
    schedule: "0 4 * * *"
    # Maximum successful deletions across all object types in one run.
    maxPerRun: 5

# Session garbage collection configuration (node plugin only)
# Periodically cleans up orphaned iSCSI/NVMe-oF sessions that may leak
# when pods are deleted, nodes restart, or unstage operations fail
sessionGC:
  # Enable periodic garbage collection (default: true). Set this false to
  # disable GC; an enabled zero/negative interval uses the 300-second default.
  enabled: true

  # Interval between GC runs in seconds (default: 300 = 5 minutes)
  interval: 300

  # Grace period before cleaning up orphaned sessions in seconds (default: 60)
  # Sessions must be orphaned for this duration before cleanup
  gracePeriod: 60

  # Dry run mode - logs orphaned sessions without disconnecting (default: false)
  # Useful for monitoring without taking action
  dryRun: false

  # Run garbage collection once during startup
  runOnStartup: true

  # Delay before startup garbage collection in seconds
  startupDelay: 5

  # Enable protocol-specific session collection
  iscsiEnabled: true
  nvmeofEnabled: true

# API resilience configuration
resilience:
  circuitBreaker:
    # The driver currently defaults to disabled when this key is absent
    enabled: false
    failureThreshold: 5
    timeout: 30
  retry:
    maxAttempts: 3
    initialDelay: 500
    maxDelay: 5000
    backoffMultiplier: 2.0
  rateLimiting:
    maxConcurrentRequests: 10
    maxConcurrentLogins: 2

# Host command timeouts in seconds
commandTimeouts:
  mount: 30
  format: 300
  iscsi: 10
  nvme: 30
