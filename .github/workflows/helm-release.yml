# Helm Chart Release Workflow (OCI)
# Publishes Helm charts to GitHub Container Registry as OCI artifacts.
# Usage: helm pull oci://ghcr.io/gizmotickler/charts/scale-csi --version <version>

name: Helm Chart Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  CHART_NAME: scale-csi

jobs:
  release:
    name: Package and Sign Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get chart version
        id: chart_version
        shell: bash
        run: |
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${VERSION}"

      - name: Update chart version
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" "charts/${CHART_NAME}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "charts/${CHART_NAME}/Chart.yaml"
          helm show chart "charts/${CHART_NAME}"

      - name: Lint chart
        run: helm lint --strict "charts/${CHART_NAME}"

      - name: Package chart
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: helm package "charts/${CHART_NAME}" --destination .helm-packages

      - name: Create SLSA provenance predicate
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
        shell: bash
        run: |
          PACKAGE=".helm-packages/${CHART_NAME}-${VERSION}.tgz"
          PACKAGE_SHA256=$(sha256sum "$PACKAGE" | awk '{print $1}')
          BUILD_STARTED_ON=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          jq -n \
            --arg builder "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/helm-release.yml@${GITHUB_REF}" \
            --arg source "git+https://github.com/${GITHUB_REPOSITORY}" \
            --arg commit "$GITHUB_SHA" \
            --arg invocation "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}" \
            --arg started "$BUILD_STARTED_ON" \
            --arg chart "$CHART_NAME" \
            --arg version "$VERSION" \
            --arg packageSha256 "$PACKAGE_SHA256" \
            '{
              builder: {id: $builder},
              buildType: "https://helm.sh/helm-package/v1",
              invocation: {
                configSource: {uri: $source, digest: {sha1: $commit}},
                parameters: {chart: $chart, version: $version, packageSha256: $packageSha256},
                environment: {githubRun: $invocation}
              },
              metadata: {
                buildInvocationId: $invocation,
                buildStartedOn: $started,
                completeness: {parameters: true, environment: true, materials: true},
                reproducible: false
              },
              materials: [{uri: $source, digest: {sha1: $commit}}]
            }' > .helm-packages/provenance.json

      - name: Push chart to OCI registry
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
          REPO_OWNER: ${{ steps.chart_version.outputs.repo_owner }}
        run: |
          helm push ".helm-packages/${CHART_NAME}-${VERSION}.tgz" \
            "oci://${REGISTRY}/${REPO_OWNER}/charts"

      - name: Install cosign
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless-sign and attest the pushed chart
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
          REPO_OWNER: ${{ steps.chart_version.outputs.repo_owner }}
        run: |
          CHART_REF="${REGISTRY}/${REPO_OWNER}/charts/${CHART_NAME}:${VERSION}"
          cosign sign --yes "$CHART_REF"
          cosign attest --yes \
            --type slsaprovenance \
            --predicate .helm-packages/provenance.json \
            "$CHART_REF"
