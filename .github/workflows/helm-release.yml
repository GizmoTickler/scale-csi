# Helm Chart Release Workflow (OCI)
# Publishes Helm charts to GitHub Container Registry as OCI artifacts.
# Usage: helm pull oci://ghcr.io/gizmotickler/charts/scale-csi --version <version>

name: Helm Chart Release

on:
  push:
    branches:
      - main
  # Tag publishes are gated on the tag CI run succeeding. `needs` cannot reach
  # across workflow files, so workflow_run is the mechanically correct construct
  # here: the chart is packaged, pushed, and signed only after the CI workflow
  # completes successfully for a v* tag.
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  CHART_NAME: scale-csi

jobs:
  release:
    name: Package and Sign Helm Chart
    # Run the lint pass on main pushes; run the tag publish only when the tag CI
    # workflow_run completed successfully. workflow_run fires for every CI run —
    # including pull_request builds — so require the triggering CI run to itself
    # be a push event with a v* head branch. A PR whose head branch is merely
    # named "v1.2.3" is a pull_request event and is rejected here; the tag is
    # then re-verified against head_sha in the step below before any publish.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          # For a workflow_run trigger GITHUB_SHA points at the default branch;
          # check out the tagged commit that CI actually validated instead.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Verify tag resolves to the CI-validated commit
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_REF="refs/tags/${RUN_HEAD_BRANCH}"
          # Dereference to the commit (^{commit}) so lightweight and annotated
          # tags both compare against the commit SHA CI actually built. Refuse
          # to publish unless the v* head branch is a real tag pointing exactly
          # at head_sha — this defeats a branch merely named "vX" and any
          # tag/commit spoof.
          if ! TAG_SHA=$(git rev-parse --verify --quiet "${TAG_REF}^{commit}"); then
            echo "::error::${TAG_REF} does not exist in the checked-out tree; refusing to publish."
            exit 1
          fi
          if [[ "${TAG_SHA}" != "${RUN_HEAD_SHA}" ]]; then
            echo "::error::${TAG_REF} points at ${TAG_SHA}, not the CI-validated commit ${RUN_HEAD_SHA}; refusing to publish."
            exit 1
          fi
          echo "Verified ${TAG_REF} resolves to ${RUN_HEAD_SHA}."

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3

      - name: Log in to Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get chart version
        id: chart_version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"

          if [[ "$EVENT_NAME" == "workflow_run" && "$RUN_HEAD_BRANCH" == v* ]]; then
            VERSION="${RUN_HEAD_BRANCH#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${VERSION}"

      - name: Update chart version
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" "charts/${CHART_NAME}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "charts/${CHART_NAME}/Chart.yaml"
          helm show chart "charts/${CHART_NAME}"

      - name: Lint chart
        run: helm lint --strict "charts/${CHART_NAME}"

      - name: Package chart
        if: ${{ github.event_name == 'workflow_run' }}
        run: helm package "charts/${CHART_NAME}" --destination .helm-packages

      - name: Create SLSA provenance predicate
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
          # Under workflow_run GITHUB_SHA is the default branch; attest the
          # tagged commit that CI validated.
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          PACKAGE=".helm-packages/${CHART_NAME}-${VERSION}.tgz"
          PACKAGE_SHA256=$(sha256sum "$PACKAGE" | awk '{print $1}')
          BUILD_STARTED_ON=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          jq -n \
            --arg builder "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/helm-release.yml@${GITHUB_REF}" \
            --arg source "git+https://github.com/${GITHUB_REPOSITORY}" \
            --arg commit "$COMMIT_SHA" \
            --arg invocation "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}" \
            --arg started "$BUILD_STARTED_ON" \
            --arg chart "$CHART_NAME" \
            --arg version "$VERSION" \
            --arg packageSha256 "$PACKAGE_SHA256" \
            '{
              builder: {id: $builder},
              buildType: "https://helm.sh/helm-package/v1",
              invocation: {
                configSource: {uri: $source, digest: {sha1: $commit}},
                parameters: {chart: $chart, version: $version, packageSha256: $packageSha256},
                environment: {githubRun: $invocation}
              },
              metadata: {
                buildInvocationId: $invocation,
                buildStartedOn: $started,
                completeness: {parameters: true, environment: true, materials: true},
                reproducible: false
              },
              materials: [{uri: $source, digest: {sha1: $commit}}]
            }' > .helm-packages/provenance.json

      - name: Push chart to OCI registry
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
          REPO_OWNER: ${{ steps.chart_version.outputs.repo_owner }}
        run: |
          helm push ".helm-packages/${CHART_NAME}-${VERSION}.tgz" \
            "oci://${REGISTRY}/${REPO_OWNER}/charts"

      - name: Install cosign
        if: ${{ github.event_name == 'workflow_run' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless-sign and attest the pushed chart
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          VERSION: ${{ steps.chart_version.outputs.version }}
          REPO_OWNER: ${{ steps.chart_version.outputs.repo_owner }}
        run: |
          CHART_REF="${REGISTRY}/${REPO_OWNER}/charts/${CHART_NAME}:${VERSION}"
          cosign sign --yes "$CHART_REF"
          cosign attest --yes \
            --type slsaprovenance \
            --predicate .helm-packages/provenance.json \
            "$CHART_REF"
